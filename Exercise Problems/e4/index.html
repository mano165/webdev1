<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Wondering Photographer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="container">
    <header>
      <img src="divider.png" alt="" class="divider">

      <button class="basket" type="button" aria-label="View shopping basket">
        <span aria-hidden="true">🛒</span>
      </button>
    </header>

    <main id="main-content">
      <article class="photo">
        <figure>
          <img
            src="BildPhoto.jpg"
            alt="A cold blue seascape viewed from the edge of an icy cliff in Greenland."
          >
          <figcaption>
            This was from a fabulous trip to the cost of Greenland with my
            family. The water was lovely- but very cold!
          </figcaption>
        </figure>
        <button type="button">Add to basket</button>
      </article>

      <article class="photo">
        <figure>
          <img
            src="OceanPhoto.jpg"
            alt="Looking up at the red structure of the Golden Gate Bridge against a blue sky."
          >
          <figcaption>
            A picture of the Golden Gate Bridge. New York! New York!
          </figcaption>
        </figure>
        <button type="button">Add to basket</button>
      </article>

      <article class="photo">
        <figure>
          <img
            src="ValleyPhoto.jpg"
            alt="A fjord-like Greenland valley with blue water between rocky cliffs."
          >
          <figcaption>
            Another great photo from Greenland. It's a river valley where a
            glacier used to be.
          </figcaption>
        </figure>
        <button type="button">Add to basket</button>
      </article>

      <article class="photo">
        <figure>
          <img
            src="WaterfallPhoto.jpg"
            alt="A tall waterfall pouring into a pool surrounded by mossy rocks."
          >
          <figcaption>
            The waterfall made such a lovely sound. I could have fallen asleep!
          </figcaption>
        </figure>
        <button type="button">Add to basket</button>
      </article>
    </main>

    <footer>
      <p>Copyright The Wondering Photographer 2018.</p>

      <nav aria-label="Footer navigation">
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Blog</a></li>
          <li><a href="#">About me</a></li>
        </ul>
      </nav>
    </footer>
  </div>
</body>
</html>
